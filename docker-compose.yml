services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 768m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 256m
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PASSGEN_DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      PASSGEN_TRANSPORT_KEY_BASE64: ${PASSGEN_TRANSPORT_KEY_BASE64:?set PASSGEN_TRANSPORT_KEY_BASE64 in .env}
    command: ["server", "--addr", ":8080"]

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    profiles: ["observability"]
    depends_on:
      app:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

volumes:
  pgdata:
