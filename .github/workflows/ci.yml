name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: passgen
          POSTGRES_USER: passgen
          POSTGRES_PASSWORD: passgen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U passgen -d passgen"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      PASSGEN_TEST_DSN: postgres://passgen:passgen@localhost:5432/passgen?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: OpenAPI validation
        run: make openapi-check

      - name: Migration check
        run: make migration-check

      - name: Tests (unit + integration)
        run: make test

      - name: Build
        run: make build

      - name: Smoke run server
        shell: bash
        run: |
          set -euo pipefail
          export PASSGEN_DB_DSN="${PASSGEN_TEST_DSN}"
          export PASSGEN_TRANSPORT_KEY_BASE64="$(go run ./cmd/passgen keygen)"
          go run ./cmd/passgen server --addr 127.0.0.1:18080 > /tmp/passgen-server.log 2>&1 &
          server_pid=$!
          trap 'kill ${server_pid} || true; cat /tmp/passgen-server.log || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz > /dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:18080/healthz | grep '"status":"ok"'
          curl -fsS http://127.0.0.1:18080/metrics | grep 'passgen_http_requests_total'
          kill ${server_pid}
          wait ${server_pid} || true
