name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: passgen
          POSTGRES_USER: passgen
          POSTGRES_PASSWORD: passgen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U passgen -d passgen"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      PASSGEN_TEST_DSN: postgres://passgen:passgen@localhost:5432/passgen?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: OpenAPI validation
        run: make openapi-check

      - name: Migration check
        run: make migration-check

      - name: Tests (unit + integration)
        run: make test

      - name: Build
        run: make build
